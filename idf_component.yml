name: esp_wiz_toe
version: "0.1.0"
description: "ESP-IDF SPI port layer for using WIZnet W5500 with the official ioLibrary"
license: "MIT"
repository: "https://github.com/Wiznet/esp_wiz_toe"
url: "https://github.com/Wiznet/esp_wiz_toe"
tags:
  - ethernet
  - wiznet
  - w5500
  - spi
  - toe
targets:
  - esp32s3
dependencies:
  idf:
    version: ">=5.4.0,<5.5.0"

examples:
  - path: examples/tcp_client
  - path: examples/tcp_server

files:
  use_gitignore: true
  exclude:
    - ".git"
    - ".git/**"
    - "TODO.md"
    - ".componentignore"
    - "examples/**/sdkconfig.old"
    - "third_party/ioLibrary_Driver/.git"
    - "third_party/ioLibrary_Driver/**/*.chm"
    - "third_party/ioLibrary_Driver/Internet/MQTT/**/*"
    - "third_party/ioLibrary_Driver/Internet/SNMP/**/*"
    - "third_party/ioLibrary_Driver/Internet/SNTP/**/*"
    - "third_party/ioLibrary_Driver/Internet/TFTP/**/*"
    - "third_party/ioLibrary_Driver/Internet/httpServer/**/*"
